name: Deploy Backend to EC2

on:
  push:
    branches:
      - deploy

jobs:
  build-push-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar codigo
        uses: actions/checkout@v4

      - name: Login en Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Construir imagen Docker
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest .

      - name: Publicar imagen en Docker Hub
        run: docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

      - name: Desplegar backend en EC2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_BACK_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            docker network create innovatech-net || true

            docker volume create mysql_data || true

            docker stop innovatech-mysql || true
            docker rm innovatech-mysql || true

            docker run -d \
              --name innovatech-mysql \
              --network innovatech-net \
              -e MYSQL_DATABASE=innovatech \
              -e MYSQL_ROOT_PASSWORD=root \
              -e MYSQL_USER=innovatech \
              -e MYSQL_PASSWORD=innovatech123 \
              -v mysql_data:/var/lib/mysql \
              --restart always \
              mysql:8.0

            sleep 25

            docker pull ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

            docker stop innovatech-backend || true
            docker rm innovatech-backend || true

            docker run -d \
              --name innovatech-backend \
              --network innovatech-net \
              -p 8080:8080 \
              -e SPRING_DATASOURCE_URL=jdbc:mysql://innovatech-mysql:3306/innovatech \
              -e SPRING_DATASOURCE_USERNAME=innovatech \
              -e SPRING_DATASOURCE_PASSWORD=innovatech123 \
              --restart always \
              ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest